name: Build DOOM for MT7628

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # allows manual trigger from UI

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        build_type: [dynamic, static]
        include:
          - build_type: dynamic
            static_flag: 0
          - build_type: static
            static_flag: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t doom-compiler -f .devcontainer/Dockerfile .

      - name: Compile DOOM (${{ matrix.build_type }})
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            doom-compiler \
            bash -c "make -C doomgeneric -f Makefile.mt7628 clean && \
                     make -C doomgeneric -f Makefile.mt7628 all STATIC_LINKING=${{ matrix.static_flag }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: doom-mt7628-${{ matrix.build_type }}
          path: doomgeneric/build/doomgeneric

  release:
    needs: build
    runs-on: ubuntu-22.04
    # Run only on master branch AND (commit message contains [release] OR manual trigger)
    if: |
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]')) ||
      (github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloads

      - name: Prepare files for Release
        run: |
          mkdir -p deploy
          cp ./downloads/doom-mt7628-static/doomgeneric ./deploy/doomgeneric_static
          cp ./downloads/doom-mt7628-dynamic/doomgeneric ./deploy/doomgeneric_dynamic

      - name: Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            ## DOOM Port for MT7628
            
            **Build Artifacts:**
            * `doomgeneric_static` — **Recommended**. Works on any firmware (all libraries included).
            * `doomgeneric_dynamic` — Smallest size. Requires system libraries (musl/libc) to be present on the router.
            
            *Have fun!*
          prerelease: false
          files: |
            deploy/doomgeneric_static
            deploy/doomgeneric_dynamic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}